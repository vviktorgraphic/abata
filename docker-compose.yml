services:
  postgres:
    image: postgres:16-alpine
    container_name: foglalo01-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: foglalo01
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d foglalo01"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
